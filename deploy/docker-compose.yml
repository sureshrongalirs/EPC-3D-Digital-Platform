networks:
  frontend:
  backend:
    internal: true # worker/api/postgres have no outbound network — see CLAUDE.md

services:
  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - '8080:80'
    networks:
      - frontend
      - backend
    depends_on:
      - api
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost/']
      interval: 30s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../server/api
      dockerfile: Dockerfile
    volumes:
      - ./data/models:/data/models:ro
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # Placeholder — replace with a real /health check once the API exists (Phase 1+).
      test: ['CMD-SHELL', 'exit 0']
      interval: 30s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ../server/worker
      dockerfile: Dockerfile
    volumes:
      - ./data/models:/data/models
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # Placeholder — replace once the worker has a real liveness signal (Phase 1+).
      test: ['CMD-SHELL', 'exit 0']
      interval: 30s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-plantscope}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-plantscope_dev}
      POSTGRES_DB: ${POSTGRES_DB:-plantscope}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-plantscope}']
      interval: 10s
      timeout: 5s
      retries: 5
