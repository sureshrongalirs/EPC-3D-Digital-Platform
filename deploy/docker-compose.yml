networks:
  frontend:
  backend:
    internal: true # worker/api/postgres have no outbound network — see CLAUDE.md

services:
  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - '8080:80'
    networks:
      - frontend
      - backend
    depends_on:
      - api
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost/']
      interval: 30s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../server/api
      dockerfile: Dockerfile
    environment:
      DATA_DIR: /data
      DATABASE_URL: postgres://${POSTGRES_USER:-plantscope}:${POSTGRES_PASSWORD:-plantscope_dev}@postgres:5432/${POSTGRES_DB:-plantscope}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-1024}
      PORT: 3000
    # Read-write: uploads land under /data/models/raw, published artifacts under
    # /data/models/artifacts (CLAUDE.md invariant #5 — DB stores only pointers to these).
    volumes:
      - ./data:/data
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:3000/healthz || exit 1']
      interval: 30s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ../server/worker
      dockerfile: Dockerfile
    volumes:
      - ./data/models:/data/models
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # Placeholder — replace once the worker has a real liveness signal (Phase 1+).
      test: ['CMD-SHELL', 'exit 0']
      interval: 30s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-plantscope}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-plantscope_dev}
      POSTGRES_DB: ${POSTGRES_DB:-plantscope}
    # Published so `pnpm --filter @plantscope/api dev` (running on the host, not in
    # compose) can reach it during local development — see the manual verification script
    # in the Phase 3 PR description. `backend` stays internal: true regardless; publishing
    # a port is host<->container plumbing, not outbound egress from the container.
    ports:
      - '5432:5432'
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-plantscope}']
      interval: 10s
      timeout: 5s
      retries: 5
