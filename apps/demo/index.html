<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PlantScope demo</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        font-family: system-ui, sans-serif;
      }
      #app {
        position: relative;
        width: 100%;
        height: 100vh;
        overflow: hidden;
      }
      #viewer {
        position: absolute;
        inset: 0;
      }
      #controls {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        z-index: 10;
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
        padding: 8px;
        background: rgba(255, 255, 255, 0.85);
      }
      #log {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 10;
        max-height: 30%;
        overflow: auto;
        margin: 0;
        background: rgba(0, 0, 0, 0.75);
        color: #eee;
        font: 12px monospace;
        padding: 8px;
        white-space: pre-wrap;
      }
      .plantscope-toolbar,
      .plantscope-panel {
        position: absolute;
        z-index: 10;
      }
      .plantscope-panel {
        top: 48px;
        right: 0;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="viewer"></div>
      <div id="controls">
        <strong>PlantScope demo</strong>
        <input id="file-input" type="file" accept=".glb" />
        <span>or drag &amp; drop a .glb anywhere in the viewport</span>
        <button id="fit-btn" type="button">Fit</button>
        <button id="isolate-btn" type="button">Isolate last pick</button>
        <button id="show-all-btn" type="button">Show all</button>
      </div>
      <pre id="log"></pre>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
