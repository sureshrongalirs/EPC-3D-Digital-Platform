<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PlantScope demo</title>
    <!-- Cesium.Viewer's toolbar/zoom/home/fullscreen widgets rely on this stylesheet for
         their absolute positioning -- without it they render unstyled, in normal document
         flow, stacked in the page's top-left corner with a tiny canvas (found via a
         Playwright screenshot while verifying this app's globe-as-primary-view redesign).
         Copied alongside the rest of Cesium's static assets -- see
         scripts/copy-cesium-assets.mjs and window.CESIUM_BASE_URL below. -->
    <link rel="stylesheet" href="/cesium/Widgets/widgets.css" />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        font-family: system-ui, sans-serif;
      }
      #app {
        position: relative;
        width: 100%;
        height: 100vh;
        overflow: hidden;
      }
      /* The 3D globe is the only, primary view -- it fills the whole window; every other
         control floats over it as an overlay (see #controls/#properties-panel/#log below). */
      #globe-container {
        position: absolute;
        inset: 0;
      }
      #controls {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        z-index: 10;
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
        padding: 8px;
        background: rgba(255, 255, 255, 0.85);
      }
      #properties-panel {
        position: absolute;
        top: 48px;
        right: 0;
        bottom: 30%;
        width: 320px;
        z-index: 10;
        overflow-y: auto;
        background: rgba(255, 255, 255, 0.95);
        border-left: 1px solid #ccc;
        padding: 8px;
        font: 13px monospace;
      }
      #properties-panel table {
        border-collapse: collapse;
      }
      #properties-panel th {
        text-align: left;
        padding-right: 8px;
        color: #555;
      }
      #log {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 10;
        max-height: 30%;
        overflow: auto;
        margin: 0;
        background: rgba(0, 0, 0, 0.75);
        color: #eee;
        font: 12px monospace;
        padding: 8px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="globe-container"></div>
      <div id="controls">
        <strong>PlantScope demo</strong>
        <input id="file-input" type="file" accept=".glb" />
        <span>or drag &amp; drop a .glb anywhere in the window (local preview -- placed at the default location; no LLH/georef for a local file)</span>
        <button id="fit-btn" type="button">Fit</button>
        <button id="isolate-btn" type="button">Isolate last pick</button>
        <button id="show-all-btn" type="button">Show all</button>
        <span style="border-left: 1px solid #999; margin-left: 4px; padding-left: 8px">
          <button id="upload-btn" type="button">Upload to server</button>
          <input id="upload-input" type="file" accept=".fbx,.glb" multiple style="display: none" />
          <label for="upload-input">upload one or more .fbx/.glb files to the server for conversion (each distinct filename becomes its own model)</label>
          <button id="upload-cancel-btn" type="button" disabled>Cancel all in-flight uploads</button>
        </span>
      </div>
      <div id="properties-panel">Click an object on the globe to see its properties.</div>
      <pre id="log"></pre>
    </div>
    <script>
      // Must run before any Cesium code (via @plantscope/globe-view) resolves a
      // worker/asset URL -- a plain classic script, guaranteed to execute before the
      // module script below regardless of ESM import-evaluation order. Assets are copied
      // here from node_modules at dev/build time -- see scripts/copy-cesium-assets.mjs.
      window.CESIUM_BASE_URL = '/cesium/';
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
